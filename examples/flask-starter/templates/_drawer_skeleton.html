<!-- Drawer + backdrop. Hidden by default; shown by openDrawer(url) JS. -->
<div id="drawer-backdrop" class="hidden fixed inset-0 bg-black/30 z-40 transition-opacity"
     onclick="closeDrawer()"></div>
<aside id="drawer"
       class="hidden fixed top-0 right-0 h-full w-full max-w-4xl bg-white z-50 shadow-2xl overflow-y-auto"
       aria-label="Detail drawer">
  <div id="drawer-content">
    <!-- filled by JS -->
  </div>
</aside>

<script>
(function () {
  function openDrawer(url) {
    var drawer = document.getElementById('drawer');
    var backdrop = document.getElementById('drawer-backdrop');
    var content = document.getElementById('drawer-content');
    drawer.classList.remove('hidden');
    backdrop.classList.remove('hidden');
    content.innerHTML = '<div class="p-12 text-center text-slate-500">Loading...</div>';
    fetch(url, { headers: { 'Accept': 'text/html' } })
      .then(function (r) { return r.text(); })
      .then(function (html) { content.innerHTML = html; })
      .catch(function (e) {
        content.innerHTML = '<div class="p-6 text-rose-700">Failed to load: ' + (e && e.message ? e.message : e) + '</div>';
      });
  }

  function closeDrawer() {
    document.getElementById('drawer').classList.add('hidden');
    document.getElementById('drawer-backdrop').classList.add('hidden');
  }

  // Expose globally so inline onclick handlers in the partials can call them.
  window.openDrawer = openDrawer;
  window.closeDrawer = closeDrawer;

  // Delegated click handler — any element with [data-target-id] or [data-account-key]
  // opens the matching drawer. Stop propagation on links inside so they still work.
  document.addEventListener('click', function (e) {
    var noDrawer = e.target.closest('[data-no-drawer]');
    if (noDrawer) return;
    var targetEl = e.target.closest('[data-target-id]');
    if (targetEl) {
      e.preventDefault();
      openDrawer('/target/' + encodeURIComponent(targetEl.getAttribute('data-target-id')) + '/drawer');
      return;
    }
    var accountEl = e.target.closest('[data-account-key]');
    if (accountEl) {
      e.preventDefault();
      openDrawer('/account/' + encodeURIComponent(accountEl.getAttribute('data-account-key')) + '/drawer');
      return;
    }
    var connectorEl = e.target.closest('[data-connector-id]');
    if (connectorEl) {
      e.preventDefault();
      openDrawer('/connector/' + encodeURIComponent(connectorEl.getAttribute('data-connector-id')) + '/drawer');
      return;
    }
  });

  // Esc closes drawer
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeDrawer();
  });

  // Helper used by the drawer partials' Copy buttons
  window.copyText = function (btn) {
    var el = btn.closest('[data-draft]');
    if (!el) return;
    var text = el.getAttribute('data-draft');
    navigator.clipboard.writeText(text).then(function () {
      var orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(function () { btn.textContent = orig; }, 1200);
    });
  };

  // Toggle "Mark as requested" — POSTs to /intro_requests/toggle (button is hidden
  // for now, but the handler stays here so we can re-enable without code changes).
  window.toggleRequested = function (btn) {
    var targetId = btn.getAttribute('data-target-id');
    var connectionId = btn.getAttribute('data-connection-id');
    btn.disabled = true;
    fetch('/intro_requests/toggle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ target_id: targetId, connection_id: connectionId }),
    })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        btn.disabled = false;
        if (data.requested) {
          btn.textContent = '✓ Requested';
          btn.classList.remove('bg-indigo-600', 'hover:bg-indigo-700', 'text-white');
          btn.classList.add('bg-emerald-100', 'text-emerald-800', 'border', 'border-emerald-300');
        } else {
          btn.textContent = 'Mark as requested';
          btn.classList.remove('bg-emerald-100', 'text-emerald-800', 'border', 'border-emerald-300');
          btn.classList.add('bg-indigo-600', 'hover:bg-indigo-700', 'text-white');
        }
      })
      .catch(function () { btn.disabled = false; });
  };

  // Toast helper — used by the Compose-email button to confirm clipboard state.
  function showToast(msg, ms) {
    var t = document.getElementById('app-toast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'app-toast';
      t.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 px-4 py-2 rounded-lg bg-slate-900 text-white text-sm shadow-lg z-[100] max-w-md text-center';
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.display = 'block';
    clearTimeout(t._hideTimer);
    t._hideTimer = setTimeout(function () { t.style.display = 'none'; }, ms || 4000);
  }
  window.showToast = showToast;

  // Compose email: ALWAYS open Gmail with the plain-text body filled in via the
  // URL (so the email is immediately usable). In parallel, try to copy a
  // formatted HTML version (with the target's name hyperlinked to LinkedIn)
  // to the clipboard — the user can paste over the body if they want the
  // upgraded version, but they don't have to.
  window.composeEmail = function (e, link) {
    e.preventDefault();
    var subject = link.getAttribute('data-subject') || '';
    var plainBody = link.getAttribute('data-plain-body') || '';
    var htmlBody = link.getAttribute('data-html-body') || '';
    var fallbackBody = link.getAttribute('data-fallback-body') || plainBody;

    // Always open Gmail with the plain-text body in the URL.
    var params = 'view=cm&fs=1&su=' + encodeURIComponent(subject) +
                 '&body=' + encodeURIComponent(fallbackBody);
    window.open('https://mail.google.com/mail/?' + params, '_blank');

    // Try to copy the HTML version to clipboard as an optional upgrade.
    if (navigator.clipboard && window.ClipboardItem && htmlBody) {
      try {
        var item = new ClipboardItem({
          'text/html': new Blob([htmlBody], { type: 'text/html' }),
          'text/plain': new Blob([plainBody], { type: 'text/plain' }),
        });
        navigator.clipboard.write([item]).then(function () {
          showToast('Body filled. Hyperlinked version is on your clipboard — paste over the body (Cmd/Ctrl+V) if you want the link version.', 6000);
        }).catch(function () {
          showToast('Body filled with plain text.');
        });
        return;
      } catch (err) {
        // ClipboardItem constructor can throw on older browsers — fall through
      }
    }
    showToast('Body filled with plain text.');
  };

  // "Assigned to teammate" dropdown — show/hide on click. Auto-closes on outside click.
  window.toggleAssignMenu = function (e, btn) {
    e.preventDefault();
    e.stopPropagation();
    var wrapper = btn.parentElement;
    var menu = wrapper.querySelector('ul');
    if (!menu) return;
    // Close any other open assign menus first
    document.querySelectorAll('[data-no-drawer] > ul:not(.hidden)').forEach(function (m) {
      if (m !== menu) m.classList.add('hidden');
    });
    menu.classList.toggle('hidden');
  };

  // Click outside any open assign menu → close it
  document.addEventListener('click', function (e) {
    document.querySelectorAll('[data-no-drawer] > ul:not(.hidden)').forEach(function (menu) {
      if (!menu.parentElement.contains(e.target)) menu.classList.add('hidden');
    });
  });

  // Assign-to-teammate: open Gmail compose for an email TO the teammate asking
  // them to ping their connector for an intro. Plain text only — we don't
  // currently have the teammate's email address (separate API gap).
  window.assignToTeammate = function (e, link) {
    e.preventDefault();
    var subject = link.getAttribute('data-subject') || '';
    var body = link.getAttribute('data-plain-body') || '';
    var url = 'https://mail.google.com/mail/?view=cm&fs=1' +
              '&su=' + encodeURIComponent(subject) +
              '&body=' + encodeURIComponent(body);
    window.open(url, '_blank');
    // Close the dropdown
    var menu = link.closest('ul');
    if (menu) menu.classList.add('hidden');
    showToast('Drafted email to teammate. Add their email address in the "To" field before sending.', 6000);
  };

  // Assign-via-Slack: POST to /slack/assign. Posts a Block Kit message that
  // tags the mapped teammate in the configured channel. No new tab; success
  // and failure both show a toast in the current page so the user stays in
  // their flow.
  window.assignViaSlack = function (e, link) {
    if (e && e.preventDefault) e.preventDefault();
    if (link.dataset.posting === '1') return; // double-click guard
    link.dataset.posting = '1';

    var targetId = link.getAttribute('data-target-id') || '';
    var connectionId = link.getAttribute('data-connection-id') || '';
    var ownerId = link.getAttribute('data-owner-id') || '';
    var teammateFirst = link.getAttribute('data-teammate-first') || 'teammate';

    var label = link.querySelector('span.flex-1');
    var originalLabel = label ? label.innerHTML : '';
    if (label) label.textContent = 'Posting to Slack…';

    fetch('/slack/assign', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        target_id: targetId,
        connection_id: connectionId,
        owner_id: ownerId,
      }),
    })
      .then(function (r) {
        return r.json().then(function (j) { return { ok: r.ok, body: j }; });
      })
      .then(function (res) {
        link.dataset.posting = '';
        if (label) label.innerHTML = originalLabel;
        if (res.ok && res.body && res.body.ok) {
          var channel = res.body.channel ? '#' + res.body.channel : 'Slack';
          showToast('Posted to ' + channel + '. ' + teammateFirst + " was @-mentioned.", 5000);
          var menu = link.closest('ul');
          if (menu) menu.classList.add('hidden');
        } else {
          var raw = (res.body && res.body.error) || '';
          // Map known Slack-side codes to plain-English guidance.
          var humanized = raw;
          if (/no_service/.test(raw)) {
            humanized = "the webhook was deleted in Slack. Re-set it up at Settings → Slack.";
          } else if (/channel_not_found/.test(raw)) {
            humanized = "the configured channel was renamed or deleted. Recreate the webhook against the new channel.";
          } else if (/no_team/.test(raw)) {
            humanized = "the Slack app was uninstalled. Reinstall it and re-paste the webhook at Settings → Slack.";
          } else if (/invalid_payload/.test(raw)) {
            humanized = "the saved URL isn't actually a Slack webhook. Re-paste it at Settings → Slack.";
          } else if (/^Slack returned 302/.test(raw)) {
            humanized = "the webhook URL is fake or has been revoked. Re-paste a real one at Settings → Slack.";
          }
          showToast("Slack post didn't go through: " + humanized, 8000);
        }
      })
      .catch(function (err) {
        link.dataset.posting = '';
        if (label) label.innerHTML = originalLabel;
        showToast("Slack post didn't go through (network error): " + (err && err.message ? err.message : 'unknown'), 7000);
      });
  };

  // Bulk-intro selection in the connector drawer. Each target row has a
  // checkbox; the sticky bar at the top of the drawer shows the count + a
  // "Compose bulk intro" button. Clicking it POSTs the selected target IDs
  // to /connector/{key}/bulk-intro and renders the returned draft inline,
  // with Compose-email / Copy buttons that re-use the existing handlers.
  // Lives in the skeleton (not the drawer partial) because scripts inserted
  // via innerHTML don't execute.
  function _bulkBar() {
    return document.querySelector('#drawer-content [data-bulk-bar]');
  }
  function _bulkCheckboxes() {
    return document.querySelectorAll('#drawer-content [data-bulk-target-id]');
  }
  function _refreshBulkBar() {
    var bar = _bulkBar();
    if (!bar) return;
    var checked = [];
    _bulkCheckboxes().forEach(function (cb) {
      if (cb.checked) checked.push(cb.getAttribute('data-bulk-target-id'));
    });
    var counter = bar.querySelector('[data-bulk-count]');
    if (counter) counter.textContent = checked.length;
    if (checked.length === 0) {
      bar.classList.add('hidden');
      var draftEl = bar.querySelector('[data-bulk-draft]');
      if (draftEl) {
        draftEl.classList.add('hidden');
        draftEl.innerHTML = '';
      }
    } else {
      bar.classList.remove('hidden');
    }
    return checked;
  }
  window.toggleBulkTarget = function (cb) {
    _refreshBulkBar();
  };
  window.clearBulkSelection = function () {
    _bulkCheckboxes().forEach(function (cb) { cb.checked = false; });
    _refreshBulkBar();
  };
  window.composeBulkIntro = function (btn) {
    var bar = _bulkBar();
    if (!bar) return;
    var connectorKey = bar.getAttribute('data-connector-key') || '';
    if (!connectorKey) {
      if (window.showToast) showToast("Couldn't identify the connector for this bulk intro.", 5000);
      return;
    }
    var checked = [];
    _bulkCheckboxes().forEach(function (cb) {
      if (cb.checked) checked.push(cb.getAttribute('data-bulk-target-id'));
    });
    if (checked.length === 0) return;

    var draftEl = bar.querySelector('[data-bulk-draft]');
    btn.disabled = true;
    var origText = btn.textContent;
    btn.textContent = 'Drafting…';
    if (draftEl) {
      draftEl.classList.remove('hidden');
      draftEl.innerHTML = '<div class="text-xs text-slate-500">Building draft…</div>';
    }

    fetch('/connector/' + encodeURIComponent(connectorKey) + '/bulk-intro', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Sec-Fetch-Site': 'same-origin' },
      body: JSON.stringify({ target_ids: checked }),
      credentials: 'same-origin',
    })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, body: j }; }); })
      .then(function (res) {
        btn.disabled = false;
        btn.textContent = origText;
        if (!res.ok || !res.body || !res.body.ok) {
          var err = (res.body && res.body.error) || 'unknown';
          if (draftEl) {
            draftEl.innerHTML = '<div class="text-xs text-rose-700">Couldn\'t build the draft: ' + err + '</div>';
          }
          return;
        }
        var b = res.body;
        var wrap = document.createElement('div');
        wrap.setAttribute('data-draft', b.plain);
        wrap.innerHTML =
          '<div class="p-3 rounded bg-white border border-indigo-200 text-xs text-slate-800 whitespace-pre-wrap font-sans">' +
          (b.plain || '').replace(/[&<>]/g, function (m) {
            return ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m];
          }) +
          '</div>' +
          '<div class="mt-2 flex items-center gap-2 flex-wrap">' +
          '  <a data-no-drawer href="' + (b.gmail_url || '#') + '" target="_blank" rel="noopener"' +
          '     onclick="composeEmail(event, this)"' +
          '     data-subject="' + (b.subject || '').replace(/"/g, '&quot;') + '"' +
          '     data-plain-body="' + (b.plain || '').replace(/"/g, '&quot;') + '"' +
          '     data-html-body="' + (b.html || '').replace(/"/g, '&quot;') + '"' +
          '     data-fallback-body="' + (b.plain_fallback || '').replace(/"/g, '&quot;') + '"' +
          '     class="text-xs px-3 py-1.5 rounded bg-indigo-600 hover:bg-indigo-700 text-white inline-flex items-center gap-1.5">' +
          '    Compose email' +
          '  </a>' +
          '  <button data-no-drawer type="button" onclick="copyText(this)"' +
          '          class="text-xs px-3 py-1.5 rounded border border-slate-300 bg-white hover:bg-slate-50">' +
          '    Copy' +
          '  </button>' +
          '  <span class="text-[11px] text-slate-500 ml-1">' + (b.count || checked.length) + ' target' +
            ((b.count || checked.length) === 1 ? '' : 's') + '</span>' +
          '</div>';
        if (draftEl) {
          draftEl.innerHTML = '';
          draftEl.appendChild(wrap);
        }
      })
      .catch(function (e) {
        btn.disabled = false;
        btn.textContent = origText;
        if (draftEl) {
          draftEl.innerHTML = '<div class="text-xs text-rose-700">Network error: ' +
            (e && e.message ? e.message : 'unknown') + '</div>';
        }
      });
  };

  // Account-drawer left-column target click → swap the right-column connectors
  // panel without losing the targets list. Lives here (not in the drawer
  // template) because <script> tags inserted via innerHTML don't execute.
  window.selectAccountTarget = function (btn, targetId) {
    var rightCol = document.getElementById('account-drawer-right');
    if (!rightCol) return;
    document.querySelectorAll('[data-account-target-id]').forEach(function (el) {
      el.classList.remove('bg-indigo-50', 'border-indigo-500');
      el.classList.add('border-transparent');
    });
    btn.classList.add('bg-indigo-50', 'border-indigo-500');
    btn.classList.remove('border-transparent');
    rightCol.innerHTML = '<div class="p-12 text-center text-slate-500">Loading paths…</div>';
    fetch('/target/' + encodeURIComponent(targetId) + '/connectors-panel',
          { headers: { 'Accept': 'text/html' } })
      .then(function (r) { return r.text(); })
      .then(function (html) { rightCol.innerHTML = html; })
      .catch(function (e) {
        rightCol.innerHTML = '<div class="p-6 text-rose-700">Failed: ' +
          (e && e.message ? e.message : e) + '</div>';
      });
  };
})();
</script>
